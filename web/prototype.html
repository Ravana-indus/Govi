<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>FarmingOS — interactive prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+Sinhala:wght@400;600&family=Noto+Sans+Tamil:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  :root{--green:#1b7a3e;--green-d:#135a2d;--amber:#e8a23d;--bg:#eef1ea;--card:#fff;--ink:#1f2421;--muted:#6b7280;--line:#e4e7e2;--danger:#c0392b}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,"Noto Sans Sinhala","Noto Sans Tamil",system-ui,sans-serif}
  .phone{max-width:430px;margin:18px auto;background:var(--card);border:1px solid var(--line);border-radius:22px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.12)}
  .bar{background:var(--green);color:#fff;padding:.8rem 1rem;display:flex;align-items:center;gap:.6rem}
  .bar .b{font-weight:700} .bar .t{font-size:.72rem;opacity:.85}
  .langs{margin-left:auto;display:flex;gap:.25rem}
  .langs button{border:1px solid rgba(255,255,255,.45);background:transparent;color:#fff;border-radius:6px;padding:.18rem .42rem;font-size:.72rem;cursor:pointer}
  .langs button.on{background:#fff;color:var(--green);font-weight:700}
  .tabs{display:flex;background:var(--green-d)}
  .tabs button{flex:1;border:0;background:transparent;color:#fff;opacity:.7;padding:.55rem;font-size:.8rem;cursor:pointer;border-bottom:3px solid transparent}
  .tabs button.on{opacity:1;border-bottom-color:var(--amber);font-weight:600}
  .view{padding:1rem;min-height:520px}
  h3{margin:.1rem 0 .8rem}
  label{display:block;font-size:.8rem;color:var(--muted);margin:.55rem 0 .22rem}
  input,select{width:100%;padding:.55rem .65rem;border:1px solid var(--line);border-radius:9px;font:inherit;background:#fff}
  .btn{background:var(--green);color:#fff;border:0;border-radius:9px;padding:.6rem 1rem;font:inherit;font-weight:600;cursor:pointer;margin-top:.7rem}
  .btn:hover{background:var(--green-d)} .btn.amber{background:var(--amber);color:#3a2a08}
  .btn.sm{padding:.32rem .6rem;font-size:.78rem;margin:0}
  .row{display:flex;gap:.55rem}.row>*{flex:1}
  .dots{display:flex;gap:.35rem;margin-bottom:.7rem}.dots span{width:8px;height:8px;border-radius:50%;background:var(--line)}.dots span.on{background:var(--green)}
  .chat{display:flex;flex-direction:column;gap:.5rem;min-height:330px}
  .msg{max-width:85%;padding:.55rem .75rem;border-radius:14px;line-height:1.42;white-space:pre-wrap;font-size:.9rem}
  .msg.in{align-self:flex-end;background:var(--green);color:#fff;border-bottom-right-radius:4px}
  .msg.out{align-self:flex-start;background:#e9ece7;border-bottom-left-radius:4px}
  .meta{display:block;margin-top:.35rem}
  .pill{display:inline-block;font-size:.68rem;padding:.1rem .48rem;border-radius:999px;background:#dfe5dd;color:var(--muted);margin-right:.25rem}
  .pill.reco{background:#e3f4e9;color:var(--green-d);font-weight:700}.pill.warn{background:#fbe7d6;color:#9a5a08}
  .composer{display:flex;gap:.4rem;margin-top:.7rem}.composer input{flex:1}
  .chips{display:flex;gap:.4rem;margin-top:.5rem;flex-wrap:wrap}.chip{font-size:.74rem;border:1px solid var(--line);background:#fff;border-radius:999px;padding:.3rem .6rem;cursor:pointer}
  table{width:100%;border-collapse:collapse;font-size:.84rem;margin-top:.4rem}th,td{text-align:left;padding:.38rem .35rem;border-bottom:1px solid var(--line)}
  .barpct{height:10px;background:var(--line);border-radius:999px;overflow:hidden}.barpct>i{display:block;height:100%;background:var(--green)}
  .muted{color:var(--muted);font-size:.82rem}.flash{color:var(--green);font-size:.82rem;margin-top:.4rem}
  .esc{border:1px solid var(--line);border-radius:10px;padding:.6rem;margin-bottom:.5rem}
  .note{background:#f4f7f2;border:1px dashed var(--line);border-radius:10px;padding:.6rem .7rem;font-size:.78rem;color:var(--muted);margin-top:.6rem}
  .tag{font-size:.62rem;background:#fff3;padding:.1rem .4rem;border-radius:5px;margin-left:.3rem}
</style>
</head>

const T={
 en:{tagline:"Prices & plant health, in your language",farmer:"Farmer",portal:"Price Portal",officer:"Officer",admin:"Admin",

 si:{tagline:"මිල සහ පැළ සෞඛ්‍යය, ඔබේ භාෂාවෙන්",farmer:"ගොවියා",portal:"මිල පෝට්ලය",officer:"නිලධාරී",admin:"පරිපාලක",

   escalate:"මෙම ඡායාරූපයෙන් ආරක්ෂිතව උපදෙස් දීමට ප්‍රමාණවත් විශ්වාසයක් නැත. නිලධාරියෙකුට යොමු කර ඇත. කරුණාකර හානි වූ කොළයේ පැහැදිලි ඡායාරූපයක් එවන්න.",

   escalate:"இந்தப் புகைப்படத்தில் பாதுகாப்பாக ஆலோசனை வழங்க போதிய நம்பிக்கை இல்லை. அதிகாரிக்கு அனுப்பப்பட்டது. தெளிவான இலைப் புகைப்படத்தை அனுப்பவும்.",

const STEPS=["Remove and destroy affected lower leaves; do not compost them.","Improve airflow — stake plants and widen spacing.","Avoid overhead watering; water at the base in the morning.","Apply a recommended fungicide (mancozeb/chlorothalonil) per label, every 7–10 days in wet weather.","Rotate away from tomato/potato/brinjal next season."];

function haversine(a,b,c,d){const R=6371,r=Math.PI/180;const p1=a*r,p2=c*r,dp=(c-a)*r,dl=(d-b)*r;const x=Math.sin(dp/2)**2+Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;return Math.round(2*R*Math.asin(Math.sqrt(x))*10)/10}
function priceConf(days,n){let c=1;if(days>STALE_DAYS)c-=Math.min(.5,.1*(days-STALE_DAYS));if(n<=1)c-=.2;return Math.max(.1,Math.round(c*100)/100)}
function options(crop){const pm=PRICES[crop]||{};const out=[];for(const m of MARKETS){const p=pm[m.id];if(!p)continue;const mid=(p.min+p.max)/2;const dist=haversine(FARMER.lat,FARMER.lng,m.lat,m.lng);const net=Math.round((mid-TRANSPORT*dist)*10)/10;out.push({name:m.name,min:p.min,max:p.max,dist,net,days:p.days,trend:p.trend})}out.sort((a,b)=>b.net-a.net);return out}
function decide(best,opts){if(best.trend==="rising")return"hold";if(best.dist>25&&opts.length>1&&best.net>opts[1].net*1.05)return"go:"+best.name;return"sell"}
function priceReply(crop,lang){const t=T[lang];const cn=lang==="en"?crop:(NAMES[crop]?.[lang]||crop);const opts=options(crop);if(!opts.length)return{text:t.nodata(cn),escalate:true,conf:.15};const b=opts[0];const d=decide(b,opts);const reco=d==="sell"?t.sell:d==="hold"?t.hold:t.go(b.name);const conf=priceConf(b.days,opts.length);let txt=t.summary(cn,b.net,b.name,b.dist,t[b.trend],reco);if(b.days>STALE_DAYS)txt+=" ⚠";return{text:txt,reco:d.replace("go:","→ "),conf,opts}}

function renderShell(){

  renderView();
}
function setLang(l){lang=l;renderShell()} function setTab(k){tab=k;renderView();renderShell()}

function renderView(){const t=T[lang];const v=$("view");
  if(tab==="farmer")return onboarded?renderChat():renderOnboard();

   <input type="range" min="0.3" max="0.95" step="0.05" value="${cropThreshold}" oninput="cropThreshold=parseFloat(this.value);document.getElementById('thv').textContent=cropThreshold.toFixed(2)"/>
   <p class="muted">Below this, a diagnosis escalates to an officer instead of advising. (Live-tunable — the Crop Doctor reads it per request.)</p>
   <label style="display:flex;gap:.5rem;align-items:center;margin-top:.5rem"><input type="checkbox" ${assistedMode?"checked":""} onchange="assistedMode=this.checked" style="width:auto"/> <span>Assisted mode — an officer fronts every AI answer (pilot). Try it, then ask a price on the Farmer tab.</span></label>
   <div style="margin-top:1rem"><b>North-star &amp; usage</b></div>
   <div class="row" style="margin-top:.4rem">
     <div style="flex:1;background:#f4f7f2;border-radius:10px;padding:.6rem;text-align:center"><div style="font-size:1.3rem;font-weight:700;color:var(--green-d)">${advised}</div><div class="muted">advised</div></div>
     <div style="flex:1;background:#f4f7f2;border-radius:10px;padding:.6rem;text-align:center"><div style="font-size:1.3rem;font-weight:700;color:var(--green-d)">100%</div><div class="muted">acted</div></div>
     <div style="flex:1;background:#f4f7f2;border-radius:10px;padding:.6rem;text-align:center"><div style="font-size:1.3rem;font-weight:700;color:var(--green-d)">${escalations.length}</div><div class="muted">escalations</div></div>
   </div>
   <div class="note">Admins author &amp; validate KB docs (only validated docs are retrievable), tune flags, and watch the north-star. Every Crop Doctor answer cites a validated doc.</div>`;
}

function renderOnboard(){const t=T[lang];
  $("view").innerHTML=`<div class="dots">${[0,1,2].map(i=>`<span class="${i<=step?'on':''}"></span>`).join("")}</div>
   <h3>${t.welcome}</h3>
   ${step===0?`<label>${t.phone}</label><input id="ph" value="+9477 123 4567"/><button class="btn" onclick="step=1;renderView()">${t.send}</button>`:""}
   ${step===1?`<label>${t.otp}</label><input value="255203"/><label>${t.district}</label><select><option>Matale</option><option>Kandy</option><option>Nuwara Eliya</option></select><button class="btn" onclick="step=2;renderView()">${T[lang].finish==='Finish & start'?'Next':'➜'}</button>`:""}
   ${step===2?`<label style="display:flex;gap:.5rem;align-items:flex-start"><input type="checkbox" checked style="width:auto;margin-top:.2rem"/><span>${t.consent}</span></label><button class="btn" onclick="onboarded=true;chat=[{d:'out',text:T[lang].ask}];renderView()">${t.finish}</button>`:""}
   <div class="note">Phone is identity (OTP). Location drives nearest-market pricing. Consent is captured &amp; timestamped, and your data is yours — export or delete it anytime (Sri Lanka PDPA).</div>`;
}

function renderChat(){const t=T[lang];
  $("view").innerHTML=`<div class="chat" id="cl"></div>
    <div class="composer"><input id="q" placeholder="${t.ask}"/><button class="btn" onclick="ask()">➤</button></div>
    <div class="chips"><span class="chip" onclick="quick('tomato')">🍅 tomato price</span><span class="chip" onclick="voiceNote()">🎤 voice note</span><span class="chip" onclick="photo(true)">📷 clear leaf</span><span class="chip" onclick="photo(false)">📷 blurry leaf</span></div>`;
  drawChat();$("q").addEventListener("keydown",e=>{if(e.key==="Enter")ask()});
}
function drawChat(){const cl=$("cl");if(!cl)return;cl.innerHTML=chat.map(m=>`<div class="msg ${m.d}">${m.text}${(m.agent||m.reco||m.conf!=null)?`<span class="meta">${m.agent?`<span class="pill">${m.agent}</span>`:""}${m.reco?`<span class="pill reco">${m.reco}</span>`:""}${m.conf!=null?`<span class="pill">conf ${Math.round(m.conf*100)}%</span>`:""}${m.warn?`<span class="pill warn">escalated</span>`:""}</span>`:""}</div>`).join("");cl.scrollTop=cl.scrollHeight}
function quick(c){$("q").value=c+" price";ask()}
function ask(){const q=$("q").value.trim();if(!q)return;chat.push({d:"in",text:q});const low=q.toLowerCase();
  let crop=CROPS.find(c=>low.includes(c.toLowerCase()))||(low.includes("beet")?"Beetroot":low.includes("tomato")||low.includes("තක්")||low.includes("தக்")?"Tomato":null);
  if(crop){const r=priceReply(crop,lang);
    if(assistedMode && !r.escalate){chat.push({d:"out",text:HOLDING[lang],agent:"price",reco:"held"});addEsc("assisted",crop+" price",r.text);}
    else{chat.push({d:"out",text:r.text,agent:"price",reco:r.reco,conf:r.conf,warn:r.escalate});if(r.escalate)addEsc("price",crop);}}
  else chat.push({d:"out",text:lang==="en"?"I can help with crop prices and plant health.":T[lang].ask});
  $("q").value="";drawChat();
}
function voiceNote(){chat.push({d:"in",text:"🎤 voice note (3s)"});chat.push({d:"out",text:"📝 \""+ (lang==="en"?"tomato price":"තක්කාලි මිල") +"\"",agent:"asr"});drawChat();setTimeout(()=>{$("q").value="tomato price";ask();},250);}
function photo(clear){const t=T[lang];chat.push({d:"in",text:"📷 leaf.jpg"});
  if(clear){const draft=`${t.diag("early blight",67)}\n${t.steps}\n• ${STEPS.slice(0,3).join("\n• ")}\nSource: Tomato blight management.`;
    if(assistedMode){chat.push({d:"out",text:HOLDING[lang],agent:"crop",reco:"held"});addEsc("assisted","leaf photo (early blight)",draft);}
    else chat.push({d:"out",text:draft,agent:"crop",reco:"early_blight",conf:.67});}
  else{chat.push({d:"out",text:t.escalate,agent:"crop",conf:.41,warn:true});addEsc("crop","blurry photo");}
  drawChat();
}
function addEsc(type,reason,draft){escalations.push({id:"E"+(escalations.length+1+Math.floor(Math.random()*900)),type,reason,status:"open",draft});}

function renderPortal(){const t=T[lang];const pct=Math.round(100*covered/total);
  $("view").innerHTML=`<h3>${t.entry}</h3>
   <div class="row"><div><label>Market</label><select>${MARKETS.map(m=>`<option>${m.name}</option>`).join("")}</select></div>
   <div><label>Crop</label><select id="pc">${CROPS.map(c=>`<option>${c}</option>`).join("")}</select></div></div>
   <div class="row"><div><label>${t.min}</label><input id="pmin" type="number" value="300"/></div><div><label>${t.max}</label><input id="pmax" type="number" value="340"/></div></div>
   <button class="btn" onclick="savePrice()">${t.save}</button><div class="flash" id="pf"></div>
   <h3 style="margin-top:1.2rem">${t.coverage}</h3>
   <div class="barpct"><i style="width:${pct}%"></i></div>
   <p class="muted">${pct}% — ${covered}/${total} market×crop cells filled today</p>
   <div class="note">District-scoped &amp; audited. Bulk CSV upload supported: market_id,crop_id,price_min,price_max,observed_date.</div>`;
}
function savePrice(){covered=Math.min(total,covered+1);$("pf").textContent="✓ saved — coverage updated";renderPortal();setTimeout(()=>{const f=$("pf");if(f)f.textContent="";},10);}

function renderOfficer(){const t=T[lang];
  const items=escalations.length?escalations.map(e=>`<div class="esc"><b>${e.type.toUpperCase()}</b> · ${e.reason} <span class="pill ${e.status==='open'?'warn':'reco'}">${e.status==='resolved'?t.resolved:e.status}</span>
    ${e.draft?`<div style="background:#f4f7f2;border-radius:8px;padding:.5rem;margin:.4rem 0;font-size:.82rem;white-space:pre-wrap">📝 AI draft:\n${e.draft}</div>`:"<br/>"}
    ${e.status==='open'?`<button class="btn sm amber" style="margin-top:.2rem" onclick="claim('${e.id}')">${t.claim}</button>`:""}
    ${e.status==='claimed'?`<button class="btn sm" style="margin-top:.2rem" onclick="resolve('${e.id}')">${e.draft?'Approve & send':t.resolve}</button>`:""}</div>`).join(""):`<p class="muted">No open escalations. Trigger one: send a blurry leaf, ask 'beetroot price', or turn on Assisted mode in Admin.</p>`;
  $("view").innerHTML=`<h3>${t.officerq}</h3>${items}<div class="note">Human-in-the-loop: claim → view farmer context + AI draft → edit/approve → resolve. Powers assisted mode.</div>`;
}
function claim(id){const e=escalations.find(x=>x.id===id);if(e)e.status="claimed";renderOfficer()}
function resolve(id){const e=escalations.find(x=>x.id===id);if(e)e.status="resolved";renderOfficer()}

renderShell();
</script>
</body>
</html>
