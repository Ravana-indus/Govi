# FarmingOS — full canonical stack for local/prod-like runs.
# Dev-on-your-laptop alternative (no Docker): see docs/RUNBOOK.md (SQLite + mock).
services:
  db:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: farmingos
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: farmingos
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farmingos"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: farmingos
      MINIO_ROOT_PASSWORD: secret123
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]

  backend:
    build:
      context: ..
      dockerfile: infra/backend.Dockerfile
    environment:
      APP_ENV: prod
      DATABASE_URL: postgresql+psycopg2://farmingos:secret@db:5432/farmingos
      REDIS_URL: redis://redis:6379/0
      MODEL_PROVIDER: mock        # set to openai/anthropic/gemini + LLM_API_KEY for real models
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: farmingos
      S3_SECRET_KEY: secret123
      JWT_SECRET: change-me-in-prod-please-32+chars-0000
    depends_on:
      db: { condition: service_healthy }
    ports: ["8000:8000"]

  web:
    build:
      context: ..
      dockerfile: infra/web.Dockerfile
    depends_on: [backend]
    ports: ["8080:80"]

volumes:
  pgdata:
  miniodata:
